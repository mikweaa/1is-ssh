services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sisgrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sisgrade}
    volumes:
      - .data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sisgrade} -d ${POSTGRES_DB:-sisgrade}"]
      interval: 2s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    networks:
      - app

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sisgrade}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sisgrade}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      # CORS needs to match the domain exactly (include both apex and www)
      CORS_ORIGIN: ${CORS_ORIGIN:-https://1nteger.org,https://www.1nteger.org}
    networks:
      - app
      - localproxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=localproxy"

      - "traefik.http.routers.1is-api.rule=(Host(`1nteger.org`) || Host(`www.1nteger.org`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.1is-api.entrypoints=private-https"
      - "traefik.http.routers.1is-api.tls=true"
      - "traefik.http.services.1is-api.loadbalancer.server.port=3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - api
    networks:
      - app
      - localproxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=localproxy"

      # Frontend everything except /api
      - "traefik.http.routers.1is.rule=(Host(`1nteger.org`) || Host(`www.1nteger.org`)) && !PathPrefix(`/api`)"
      - "traefik.http.routers.1is.entrypoints=private-https"
      - "traefik.http.routers.1is.tls=true"
      - "traefik.http.services.1is.loadbalancer.server.port=8080"

networks:
  app:
    driver: bridge
  localproxy:
    external: true